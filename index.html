<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calliope Game 2</title>
    <style>
        /* Базовая архитектура и защита от скролла iOS (из MASTER DOCUMENT) */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111; /* Темный фон вместо слепящего белого */
            color: #fff;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Жестко зафиксированные пропорции 852x393 */
        #game-container {
            width: 852px;
            height: 393px;
            position: relative;
            background-color: #2c3e50;
            transform-origin: center center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Экран загрузки */
        #loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .progress-bar {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            border: 2px solid #e67e22;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #e67e22;
            transition: width 0.2s;
        }

        #play-btn {
            display: none;
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Трекер прогресса (UI) */
        #ui-tracker {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        .golden-text { color: #f1c40f; }

        /* Окно выбора пасхалки (Новая логика!) */
        #easter-egg-prompt {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            border: 3px solid #f1c40f;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            z-index: 1500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 80%;
            max-width: 400px;
        }

        #easter-egg-prompt h2 {
            margin-top: 0;
            color: #f1c40f;
        }

        .prompt-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
        }

        .btn-yes, .btn-no {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-yes:active, .btn-no:active { transform: scale(0.95); }
        .btn-yes { background: #2ecc71; color: white; }
        .btn-no { background: #e74c3c; color: white; }

        /* Виртуальная крестовина D-Pad */
        #d-pad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 100;
            opacity: 0.7;
        }
        .d-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #e67e22;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            user-select: none;
        }
        .d-up { top: 0; left: 40px; }
        .d-down { bottom: 0; left: 40px; }
        .d-left { top: 40px; left: 0; }
        .d-right { top: 40px; right: 0; }

        /* Отладка */
        #debug-restart {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,0,0,0.5);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="852" height="393"></canvas>

    <!-- Прелоадер -->
    <div id="loading-screen">
        <h1 style="color:#e67e22; margin:0;">Загрузка Ассетов...</h1>
        <p id="loading-text" style="color:#aaa; font-size:14px; margin-top:5px;">Инициализация...</p>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <button id="play-btn" onclick="startGame()">ИГРАТЬ</button>
    </div>

    <!-- Интерфейс -->
    <div id="ui-tracker">
        <div id="items-count">📦 Предметы: 0/4</div>
        <div id="easter-count">💰 Пасхалка: 0/1</div>
    </div>

    <!-- Окно выбора пасхалки (НОВОЕ) -->
    <div id="easter-egg-prompt">
        <h2>Секрет не раскрыт!</h2>
        <p>Вы собрали все 4 артефакта, но на уровне скрыта тайная пасхалка. Хотите попытаться найти её?</p>
        <div class="prompt-buttons">
            <button class="btn-yes" onclick="decideEasterEgg(true)">Да, искать</button>
            <button class="btn-no" onclick="decideEasterEgg(false)">Нет, к Боссу</button>
        </div>
    </div>

    <!-- Управление -->
    <div id="d-pad">
        <div class="d-btn d-up" ontouchstart="movePlayer(0, -1)" onmousedown="movePlayer(0, -1)">↑</div>
        <div class="d-btn d-down" ontouchstart="movePlayer(0, 1)" onmousedown="movePlayer(0, 1)">↓</div>
        <div class="d-btn d-left" ontouchstart="movePlayer(-1, 0)" onmousedown="movePlayer(-1, 0)">←</div>
        <div class="d-btn d-right" ontouchstart="movePlayer(1, 0)" onmousedown="movePlayer(1, 0)">→</div>
    </div>

    <button id="debug-restart" onclick="location.reload()">↻</button>
</div>

<script>
    // --- Масштабирование экрана под устройства ---
    function resizeGame() {
        const container = document.getElementById('game-container');
        const scaleX = window.innerWidth / 852;
        const scaleY = window.innerHeight / 393;
        const scale = Math.min(scaleX, scaleY);
        container.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();

    // --- Прелоадер (ИСПРАВЛЕННЫЙ) ---
    const assetsList = {
        'player': 'images/model/Julia/Julia.png', // Fallback URL, if fails we draw Rect
        'crown': 'images/Crown.png',
        'shield': 'images/Shield.png',
        'shoulders': 'images/Shoulders.png',
        'hammer': 'images/Hammer.png',
        'portal': 'images/textures/PORTAL.png',
        'easterEgg': 'images/money_bag.png'
    };

    const images = {};
    let loadedAssets = 0;
    const totalAssets = Object.keys(assetsList).length;
    
    const progressFill = document.getElementById('progress-fill');
    const loadingText = document.getElementById('loading-text');
    const playBtn = document.getElementById('play-btn');

    function preloadAssets() {
        if (totalAssets === 0) return showPlayButton();

        for (let key in assetsList) {
            let img = new Image();
            
            // ВАЖНО: Если картинка загрузилась
            img.onload = () => {
                images[key] = img;
                updateProgress(key);
            };
            
            // ВАЖНО: Защита от вечного белого экрана. Если нет файла - мы идем дальше!
            img.onerror = () => {
                console.warn(`[ПРЕЛОАДЕР] Ошибка загрузки ассета: ${assetsList[key]}. Пропускаем...`);
                images[key] = null; // Помечаем как null, чтобы движок рисовал заглушку
                updateProgress(key);
            };

            img.src = assetsList[key];
        }
    }

    function updateProgress(key) {
        loadedAssets++;
        let percent = Math.floor((loadedAssets / totalAssets) * 100);
        progressFill.style.width = percent + '%';
        loadingText.innerText = `Загружено: ${percent}%`;

        if (loadedAssets === totalAssets) {
            showPlayButton();
        }
    }

    function showPlayButton() {
        loadingText.innerText = "Готово!";
        playBtn.style.display = 'block';
    }

    // --- Игровое состояние ---
    let isPlaying = false;
    let isPromptActive = false; // Блокировка управления при выборе
    let isBossFight = false;

    // Игрок
    let playerX = 0;
    let playerY = 0;
    
    // Предметы на изометрической сетке
    let items = [
        { id: 'crown', x: 2, y: 1, collected: false },
        { id: 'shield', x: -2, y: 2, collected: false },
        { id: 'shoulders', x: 3, y: 3, collected: false },
        { id: 'hammer', x: -1, y: -2, collected: false }
    ];

    let easterEgg = { x: -3, y: 4, collected: false, revealed: false };

    // --- Игровая логика ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function startGame() {
        document.getElementById('loading-screen').style.display = 'none';
        isPlaying = true;
        
        // ВНИМАНИЕ: Здесь разблокировка аудио контекста для iOS (из Master Document)
        // [Звуки и видео play().then -> pause()]
        
        requestAnimationFrame(gameLoop);
    }

    // Клавиатура
    window.addEventListener('keydown', (e) => {
        if (!isPlaying || isPromptActive) return;
        if (e.key === 'ArrowUp') movePlayer(0, -1);
        if (e.key === 'ArrowDown') movePlayer(0, 1);
        if (e.key === 'ArrowLeft') movePlayer(-1, 0);
        if (e.key === 'ArrowRight') movePlayer(1, 0);
    });

    function movePlayer(dx, dy) {
        if (!isPlaying || isPromptActive) return;

        let targetX = playerX + dx;
        let targetY = playerY + dy;

        // Лимиты карты (простая сетка от -4 до +4)
        if (targetX < -4 || targetX > 4 || targetY < -4 || targetY > 4) return;

        playerX = targetX;
        playerY = targetY;

        checkCollisions();
    }

    function checkCollisions() {
        let collectedCount = 0;

        // Проверка артефактов
        items.forEach(item => {
            if (!item.collected && playerX === item.x && playerY === item.y) {
                item.collected = true;
                // Тут должен запускаться мини-квест из dispatch (ДНД, Таро и т.д.)
                if(item.id === 'crown') {
                    easterEgg.revealed = true; // Открываем путь к пасхалке
                }
            }
            if (item.collected) collectedCount++;
        });

        // Проверка пасхалки
        if (easterEgg.revealed && !easterEgg.collected && playerX === easterEgg.x && playerY === easterEgg.y) {
            easterEgg.collected = true;
            updateUI(collectedCount);
            // Если все собрано и пасхалка тоже, можно сразу идти к боссу
            if (collectedCount === 4) {
                goToBoss();
            }
        }

        updateUI(collectedCount);

        // ЛОГИКА ПАСХАЛКИ (ИСПРАВЛЕНИЕ 1)
        if (collectedCount === 4 && !easterEgg.collected) {
            showEasterEggPrompt();
        } else if (collectedCount === 4 && easterEgg.collected) {
            goToBoss();
        }
    }

    function updateUI(collectedCount) {
        const itemsTracker = document.getElementById('items-count');
        const easterTracker = document.getElementById('easter-count');
        
        itemsTracker.innerText = `📦 Предметы: ${collectedCount}/4`;
        if (collectedCount === 4) itemsTracker.classList.add('golden-text');

        easterTracker.innerText = `💰 Пасхалка: ${easterEgg.collected ? '1/1' : '0/1'}`;
        if (easterEgg.collected) easterTracker.classList.add('golden-text');
    }

    // --- Окно выбора ---
    function showEasterEggPrompt() {
        isPromptActive = true;
        document.getElementById('easter-egg-prompt').style.display = 'block';
    }

    function decideEasterEgg(wantsToSearch) {
        document.getElementById('easter-egg-prompt').style.display = 'none';
        isPromptActive = false;

        if (wantsToSearch) {
            // Игрок ищет пасхалку, возвращаем управление
            console.log("Игрок пошел искать пасхалку!");
        } else {
            // Игрок отказался, отправляем к Боссу
            console.log("Переход к Боссу пропущенной пасхалкой!");
            goToBoss();
        }
    }

    function goToBoss() {
        if(isBossFight) return;
        isBossFight = true;
        console.log("Загрузка Арены Босса...");
        // Здесь ваша логика перехода (таймер 60 кадров и скрытие 2D карты)
    }

    // --- Рендеринг Canvas ---
    function drawIsoTile(cx, cy, color) {
        ctx.beginPath();
        ctx.moveTo(cx, cy - 32);
        ctx.lineTo(cx + 64, cy);
        ctx.lineTo(cx, cy + 32);
        ctx.lineTo(cx - 64, cy);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.stroke();
    }

    function drawFallbackRect(cx, cy, color, text) {
        ctx.fillStyle = color;
        ctx.fillRect(cx - 20, cy - 40, 40, 40);
        ctx.fillStyle = "white";
        ctx.font = "10px sans-serif";
        ctx.fillText(text, cx - 15, cy - 20);
    }

    function gameLoop() {
        if (!isPlaying) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (isBossFight) {
            // Рендер Арены
            ctx.fillStyle = "#8b0000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("АРЕНА БОССА", canvas.width/2, canvas.height/2);
            requestAnimationFrame(gameLoop);
            return;
        }

        // Центр камеры
        const offsetX = canvas.width / 2;
        const offsetY = canvas.height / 2;

        // Отрисовка поля (изометрия)
        for (let y = -4; y <= 4; y++) {
            for (let x = -4; x <= 4; x++) {
                // Изометрическая математика (TileW: 128, TileH: 64)
                let isoX = offsetX + (x - y) * 64;
                let isoY = offsetY + (x + y) * 32;

                // Путь к пасхалке невидим пока не открыт
                if (x === easterEgg.x && y === easterEgg.y && !easterEgg.revealed) continue;

                drawIsoTile(isoX, isoY, "#34495e");

                // Отрисовка Портала вместо красных кругов
                if ((x === 4 && y === 4) || (x === -4 && y === -4)) {
                    if (images['portal']) {
                        ctx.drawImage(images['portal'], isoX - 64, isoY - 100, 128, 128);
                    } else {
                        drawFallbackRect(isoX, isoY, "purple", "PORTAL");
                    }
                }

                // Отрисовка предметов
                items.forEach(item => {
                    if (item.x === x && item.y === y && !item.collected) {
                        if (images[item.id]) {
                            ctx.drawImage(images[item.id], isoX - 30, isoY - 60, 60, 60);
                        } else {
                            drawFallbackRect(isoX, isoY, "gold", "ITEM");
                        }
                    }
                });

                // Отрисовка пасхалки
                if (easterEgg.revealed && !easterEgg.collected && easterEgg.x === x && easterEgg.y === y) {
                    drawFallbackRect(isoX, isoY, "magenta", "СЕКРЕТ");
                }

                // Отрисовка Игрока
                if (playerX === x && playerY === y) {
                    if (images['player']) {
                        ctx.drawImage(images['player'], isoX - 40, isoY - 100, 80, 100);
                    } else {
                        // Заглушка, если картинка Джулии не найдена
                        ctx.fillStyle = "#2ecc71";
                        ctx.beginPath();
                        ctx.ellipse(isoX, isoY - 30, 20, 40, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Нимб из референса
                        ctx.strokeStyle = "gold";
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.ellipse(isoX, isoY - 80, 15, 5, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            }
        }

        requestAnimationFrame(gameLoop);
    }

    // Запуск загрузки
    preloadAssets();
</script>
</body>
</html>
